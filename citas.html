<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita de Corte de Pelo - Veterinaria Valtierra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <div class="logo"><i class="fas fa-paw"></i> Veterinaria Valtierra</div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="citas.html" class="active">Cita de corte de pelo</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="form-section">
        <div class="form-container">
            <h2>Agendar Cita para Estética</h2>
            <p>Llena los datos para apartar el baño o corte de pelo de tu mascota.</p>
            
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="propietario">Nombre del Dueño:</label>
                    <input type="text" id="propietario" required>
                </div>
                
                <div class="form-group">
                    <label for="mascota">Nombre de la Mascota:</label>
                    <input type="text" id="mascota" required>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono de Contacto:</label>
                    <input type="tel" id="telefono" required>
                </div>

                <div class="form-group">
                    <label for="fecha">Fecha y Hora sugerida:</label>
                    <input type="datetime-local" id="fecha" required>
                </div>

                <div class="form-group">
                    <label for="notas">Notas o preferencias del corte:</label>
                    <textarea id="notas" rows="3" placeholder="Ej. Corte tipo cachorro, baño medicado..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar Solicitud</button>
            </form>
            
            <div id="mensajeExito" class="mensaje-oculto">
                <i class="fas fa-check-circle"></i> ¡Cita registrada con éxito! Nos comunicaremos contigo para confirmar.
            </div>
        </div>
    </section>

    <script src="js.js"></script>
</body>
</html>
